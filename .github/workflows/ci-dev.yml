name: Build Dev Image

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  PROJECT_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE || 'registry.cn-hongkong.aliyuncs.com/xusheng/weave' }}

jobs:
  migrate:
    name: 数据库迁移 (Dev)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Migrations
        run: bunx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

  build-and-deploy:
    name: 构建并推送镜像
    needs: migrate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install & Build
        run: |
          bun install
          bun run build

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker 镜像仓库
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 获取镜像标签
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: 准备 Kustomize 环境
        uses: imranismail/setup-kustomize@v2

      - name: 更新 GitOps 仓库镜像版本
        uses: actions/checkout@v4
        with:
          repository: xuxusheng/gitops-configs
          token: ${{ secrets.GITOPS_CONFIGS_TOKEN }}
          path: gitops

      - name: 修改镜像版本号
        run: |
          cd gitops/app/$PROJECT_NAME/dev
          kustomize edit set image ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

      - name: 提交并推送代码
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: gitops
          commit_message: |-
            chore(${{ env.PROJECT_NAME }}): ${{ github.event.head_commit.message }}

            Branch: ${{ github.ref_name }}
            Image: ${{ env.IMAGE_NAME }}
            Tag: ${{ steps.version.outputs.tag }}
