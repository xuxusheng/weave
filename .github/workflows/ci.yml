name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: ${{ github.event.repository.name }}
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE || 'registry.cn-hongkong.aliyuncs.com/xusheng/monaco-variable-editor' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        run: |
          npm install
          bash scripts/copy-monaco.sh
          npm run build

      - name: Get image tag
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update GitOps
        uses: actions/checkout@v4
        with:
          repository: xuxusheng/gitops-configs
          token: ${{ secrets.GITOPS_CONFIGS_TOKEN }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag
        run: |
          cd gitops/app/$PROJECT_NAME/dev
          kustomize edit set image ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

      - name: Commit & Push GitOps
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: gitops
          commit_message: |-
            chore(${{ env.PROJECT_NAME }}): ${{ github.event.head_commit.message }}
            Image: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
