apiVersion: apps/v1
kind: Deployment
metadata:
  name: weave
  labels:
    app: weave
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weave
  template:
    metadata:
      labels:
        app: weave
    spec:
      containers:
        - name: weave
          image: <REGISTRY>/weave:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: weave-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: weave
spec:
  selector:
    app: weave
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weave
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: weave.<DOMAIN>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weave
                port:
                  number: 80
